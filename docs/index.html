<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Metro Relic</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Metro Relic</h1>
        <div class="stats">
          <span id="hp">HP: 10</span>
          <span id="scrap">Scrap: 0</span>
          <span id="floor">Этаж: 1/3</span>
          <span id="audioStatus">Audio: init</span>
        </div>
      </header>

      <section id="grid" class="grid" aria-label="Игровое поле"></section>

      <section class="panel">
        <p id="log" class="log">Начало забега. Доберись до выхода.</p>
        <div class="controls">
          <button id="endTurnBtn" type="button">Пропустить ход</button>
          <button id="restartBtn" type="button">Новый забег</button>
        </div>
      </section>
    </main>

    <div id="relicModal" class="modal hidden">
      <div class="modal-content">
        <h2>Выбери реликвию</h2>
        <div id="relicOptions" class="relic-options"></div>
      </div>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
