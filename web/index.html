<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Metro Relic</title>
    <link rel="stylesheet" href="./styles.css?v=20260401-4" />
  </head>
  <body>
    <div id="splashScreen" class="splash">
      <div class="splash-inner">
        <div class="splash-relic-glow">
          <div class="splash-relic-core"></div>
        </div>
        <h1 class="splash-title">Metro Relic</h1>
        <p id="splashTagline" class="splash-tagline">Выбраться любой ценой</p>
        <button id="splashStartBtn" type="button" class="splash-start-btn">Начать забег</button>
        <button id="splashHowToBtn" type="button" class="splash-secondary-btn">Как играть</button>
        <p id="splashMeta" class="splash-meta">Тестовая сборка • v0.1</p>
      </div>
    </div>

    <main class="app">
      <header class="topbar">
        <h1 id="topbarTitle">Metro Relic</h1>
        <div class="stats">
          <span id="hp">Жизни: 10</span>
          <span id="scrap">Трофеи: 0</span>
          <span id="floor">Этаж: 1/3</span>
          <span id="audioStatus">Audio: init</span>
        </div>
      </header>

      <section id="grid" class="grid" aria-label="Игровое поле"></section>

      <section class="panel">
        <p id="log" class="log">Начало забега. Доберись до выхода.</p>
        <div class="menu-grid">
          <button id="endTurnBtn" type="button">Пропустить ход</button>
          <button id="dashBtn" type="button">Рывок (0)</button>
          <button id="restartBtn" type="button">Новый забег</button>
          <button id="settingsBtn" type="button">Настройки</button>
          <button id="howToBtn" type="button">Как играть</button>
          <button id="faqBtn" type="button">Частые ошибки</button>
          <button id="whatsNewBtn" type="button">Что нового</button>
          <button id="statsBtn" type="button">Статистика</button>
          <button id="reportBugBtn" type="button">Сообщить о баге</button>
        </div>
      </section>
    </main>

    <div id="relicModal" class="modal hidden">
      <div class="modal-content">
        <h2 id="relicModalHeading">Выбери реликвию</h2>
        <div id="relicOptions" class="relic-options"></div>
      </div>
    </div>

    <div id="infoModal" class="modal hidden">
      <div class="modal-content info-modal-content">
        <div class="info-modal-header">
          <h2 id="infoModalTitle">Информация</h2>
          <button id="infoModalCloseBtn" type="button" class="close-btn" aria-label="Закрыть">×</button>
        </div>
        <div id="infoModalBody" class="info-modal-body"></div>
      </div>
    </div>

    <script src="./game-config.js?v=20260401-4"></script>
    <script src="./locale-bundles.js?v=20260401-4"></script>
    <script src="./pure-grid.js?v=20260401-4"></script>
    <script src="./victory-sfx-presets.js?v=20260401-4"></script>
    <script src="./game.js?v=20260401-4"></script>
  </body>
</html>
